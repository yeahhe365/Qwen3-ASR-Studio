server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /sw.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /manifest.json {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location ~* ^/assets/.*\.(?:js|mjs)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri @stale_asset_recovery;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~* \.(?:js|mjs)$ {
    add_header Cache-Control "no-store";
    try_files $uri @stale_asset_recovery;
  }

  location @stale_asset_recovery {
    internal;
    default_type application/javascript;
    add_header Cache-Control "no-store";
    try_files /stale-asset-recovery.js =404;
  }

  location ~* \.(?:css|map|json|svg|png|jpg|jpeg|gif|webp|ico|woff2?|ttf|otf|wasm)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
